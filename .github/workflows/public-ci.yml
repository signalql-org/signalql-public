name: Public CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm run docs:build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Scan for obvious secret patterns
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          skip_dirs = {
              ".git",
              "node_modules",
              ".wrangler",
              "docs/.vitepress/dist",
              "docs/.vitepress/cache",
          }
          patterns = [
              re.compile(r"-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              re.compile(r"\b(CLOUDFLARE_API_TOKEN|NPM_TOKEN|API_KEY|API_SECRET)\b\s*[:=]\s*['\"]?[A-Za-z0-9_/\-+=:.]{12,}"),
              re.compile(r"AKIA[0-9A-Z]{16}"),
          ]

          findings = []
          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              text_path = path.as_posix()
              if any(text_path == d or text_path.startswith(d + "/") for d in skip_dirs):
                  continue
              if path.suffix.lower() in {".png", ".jpg", ".jpeg", ".gif", ".webp", ".svg", ".ico", ".pdf"}:
                  continue
              try:
                  content = path.read_text(encoding="utf-8")
              except Exception:
                  continue
              for pattern in patterns:
                  if pattern.search(content):
                      findings.append(text_path)
                      break

          if findings:
              print("Potential secret patterns found:")
              for file in findings:
                  print(f"- {file}")
              sys.exit(1)

          print("No obvious secret patterns detected.")
          PY
